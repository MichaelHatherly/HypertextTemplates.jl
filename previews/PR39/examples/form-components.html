<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title></title><script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script><style type="text/tailwindcss">/* Enable class-based dark mode for Tailwind CSS v4 */
@variant dark (&:where(.dark, .dark *));
</style><script>// Theme management
const getTheme = () => localStorage.getItem('theme') || 'light';
const setTheme = (theme) => {
    localStorage.setItem('theme', theme);
    if (theme === 'dark') {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
};

// Set initial theme
setTheme(getTheme());

// Theme toggle function
window.toggleTheme = () => {
    const currentTheme = getTheme();
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    setTheme(newTheme);
    updateThemeButton();
};

// Update button text
window.updateThemeButton = () => {
    const theme = getTheme();
    const button = document.getElementById('theme-toggle');
    if (button) {
        button.innerHTML = theme === 'dark' ? '☀️ Light' : '🌙 Dark';
    }
};
</script></head><body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex" onload="updateThemeButton()"><div class="w-80 bg-white dark:bg-slate-800 border-r border-slate-200 dark:border-slate-700 overflow-y-auto flex-shrink-0"><div class="p-6"><div class="flex flex-col gap-6 items-stretch justify-start"><div class="flex flex-col gap-2 items-stretch justify-start"><h3 class="text-lg font-semibold text-slate-900 dark:text-slate-100">Components</h3><p class="text-base leading-relaxed text-sm font-normal text-slate-600 dark:text-slate-400 text-left">Browse all component examples</p></div><div class="flex flex-col gap-1 items-stretch justify-start"><a href="layout-components.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-colors">Layout Components</a><a href="typography-components.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-colors">Typography Components</a><a href="form-components.html" class="block px-3 py-2 rounded-lg bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-300 font-medium" aria-current="page">Form Components</a><a href="feedback-components.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-colors">Feedback Components</a><a href="navigation-components.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-colors">Navigation Components</a><a href="table-list-components.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-colors">Table &amp; List Components</a><a href="utility-components.html" class="block px-3 py-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-colors">Utility C
