name: CI

on:
  merge_group:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    tags: "*"

concurrency:
  # Skip intermediate builds: all builds except for builds on the `master` branch
  # Cancel intermediate builds: only pull request builds
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/main' || github.run_number }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/pull/') }}

jobs:
  finalize:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - run: exit 1
        if: needs.test.result == 'failure' || needs.test.result == 'skipped'

  test:
    permissions:
      actions: write
      contents: read
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - "1.6"
          - "1.11"
          - "1.12"
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
        exclude:
          - version: "1.6"
            os: windows-latest
          - version: "1.6"
            os: macOS-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: julia-actions/setup-julia@fa02766e078afaaf09b14210362cee14137e6a32 # v3.0.2
        with:
          version: ${{ matrix.version }}
          include-all-prereleases: true

      - uses: julia-actions/cache@a45e8fa8be21c18a06b7177052533149e61e9b38 # v3.1.0

      - uses: julia-actions/julia-buildpkg@e3eb439fad4f9aba7da2667e7510e4a46ebc46e1 # v1.7.0

      - uses: julia-actions/julia-runtest@fc07e51ec99db23b29943e95406b5762501e2897 # v1.11.5
        continue-on-error: ${{ matrix.version == 'nightly' }}
